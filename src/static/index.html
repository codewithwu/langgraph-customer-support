<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客服</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 480px;
            height: 700px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px 24px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            margin-top: 2px;
        }

        .chat-header .status-text {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.85;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.agent {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.agent .bubble {
            background: #f0f2f5;
            color: #1a1a2e;
            border-bottom-left-radius: 4px;
        }

        .message .meta {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message.agent .meta .tag {
            display: inline-block;
            background: #e8eaf6;
            color: #5c6bc0;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-right: 4px;
        }

        /* Loading 动效 */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            align-items: flex-start;
            flex-direction: column;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-indicator .bubble {
            background: #f0f2f5;
            padding: 14px 20px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator .dot:nth-child(1) {
            animation-delay: 0s;
        }

        .typing-indicator .dot:nth-child(2) {
            animation-delay: 0.16s;
        }

        .typing-indicator .dot:nth-child(3) {
            animation-delay: 0.32s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .typing-indicator .label {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            padding: 0 4px;
        }

        /* 输入区域 */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            background: #fff;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .input-area button:hover {
            opacity: 0.9;
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 2px;
        }

        /* 欢迎消息 */
        .welcome {
            text-align: center;
            color: #999;
            font-size: 13px;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span>智能客服</span>
                    <span class="status-dot"></span>
                </div>
                <div class="status-text">在线 · 随时为您服务</div>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="welcome">您好！请问有什么可以帮您？</div>
        </div>

        <!-- Loading 动效 -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="bubble">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="label">智能客服正在思考...</div>
        </div>

        <div class="input-area">
            <input type="text" id="queryInput" placeholder="请输入您的问题..." autocomplete="off">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('messages');
        const queryInput = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        let isLoading = false;

        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerHTML = `
                <div class="bubble">${escapeHtml(text)}</div>
                <div class="meta">${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}</div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function addAgentMessage(data) {
            const div = document.createElement('div');
            div.className = 'message agent';
            div.innerHTML = `
                <div class="bubble">${escapeHtml(data.response)}</div>
                <div class="meta">
                    <span class="tag">${escapeHtml(data.category)}</span>
                    <span class="tag">${escapeHtml(data.sentiment)}</span>
                    ${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}
                </div>
            `;
            messagesEl.appendChild(div);
            scrollToBottom();
        }

        function showLoading() {
            isLoading = true;
            typingIndicator.classList.add('active');
            sendBtn.disabled = true;
            queryInput.disabled = true;
            scrollToBottom();
        }

        function hideLoading() {
            isLoading = false;
            typingIndicator.classList.remove('active');
            sendBtn.disabled = false;
            queryInput.disabled = false;
            queryInput.focus();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const query = queryInput.value.trim();
            if (!query || isLoading) return;

            queryInput.value = '';
            addUserMessage(query);
            showLoading();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!res.ok) throw new Error(`请求失败: ${res.status}`);

                const data = await res.json();
                addAgentMessage(data);
            } catch (err) {
                const div = document.createElement('div');
                div.className = 'message agent';
                div.innerHTML = `<div class="bubble" style="color:#ef4444;">请求出错：${escapeHtml(err.message)}</div>`;
                messagesEl.appendChild(div);
            } finally {
                hideLoading();
            }
        }

        queryInput.focus();
    </script>
</body>
</html>
